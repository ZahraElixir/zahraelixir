<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zahra Elixir du Maroc</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HERO -->
<section class="hero">
    <img src="images/bottle main.png" alt="Zahra Elixir">
</section>

<!-- BENEFICIOS -->
<section class="full-image">
    <img src="images/Beneficio piel cabello unas barba.PNG" alt="Beneficios">
</section>

<!-- INGREDIENTES -->
<section class="full-image">
    <img src="images/Ingredients + origen.PNG" alt="Ingredientes">
</section>

<!-- HISTORIA -->
<section class="full-image">
    <img src="images/Ritual historia.PNG" alt="Historia Zahra">
</section>

<!-- COMO USAR -->
<section class="full-image">
    <img src="images/Como usar.PNG" alt="Cómo usar Zahra">
</section>

<!-- TESTIMONIOS -->
<section class="full-image">
    <img src="images/Testimonials.PNG" alt="Testimonios">
</section>

<!-- BENEFICIOS EXTRA -->
<section class="full-image">
    <img src="images/Beneficios nutre repara proteje.PNG" alt="Beneficios">
</section>

<!-- RESERVA -->
<section class="reservation">

    <img src="images/Logo.jpg" class="logo" alt="Zahra Logo">

    <h2>Reserva tu Zahra Elixir</h2>

    <form action="https://formsubmit.co/zahraelixir.tf@gmail.com" method="POST">

        <input
            type="text"
            name="nombre"
            placeholder="Nombre completo"
            required>

        <input
            type="email"
            name="email"
            placeholder="Correo electrónico"
            required>

        <input
            type="text"
            name="instagram"
            placeholder="Instagram (opcional)">

        <input
            type="number"
            name="cantidad"
            placeholder="Cantidad"
            value="1"
            min="1">

        <textarea
            name="comentarios"
            placeholder="Dirección de entrega o comentarios"></textarea>

        <button type="submit">
            Reservar ahora
        </button>

    </form>

</section>

<footer>

    <a
    href="https://instagram.com/zahraelixir.oficial"
    target="_blank">

    Instagram: @zahraelixir.oficial

    </a>

</footer>

</body>
</html>
